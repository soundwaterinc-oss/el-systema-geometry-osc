<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Smoke Test</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #11161c;
        color: #e7edf5;
      }
      main {
        width: min(560px, calc(100vw - 32px));
        padding: 24px;
        border: 1px solid #283444;
        border-radius: 20px;
        background: #171d25;
      }
      button {
        width: 100%;
        margin: 12px 0;
        padding: 16px 18px;
        border-radius: 14px;
        border: 1px solid #40536c;
        background: #253244;
        color: inherit;
        font: inherit;
        font-size: 20px;
        cursor: pointer;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        padding: 16px;
        border-radius: 12px;
        background: #0e1319;
        border: 1px solid #222c39;
        min-height: 96px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Audio Smoke Test</h1>
      <p>Pure Web Audio only: one AudioContext, one oscillator, one gain.</p>
      <button id="start">Start 440Hz Tone</button>
      <button id="stop">Stop</button>
      <pre id="log">ready</pre>
    </main>
    <script>
      let ctx = null;
      let osc = null;
      let gain = null;
      const log = document.getElementById("log");

      function write(message) {
        log.textContent += "\n" + message;
        console.log(message);
      }

      document.getElementById("start").addEventListener("click", async () => {
        try {
          if (!ctx) {
            const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
            ctx = new AudioContextCtor();
            write("context created: " + ctx.state + " sr=" + ctx.sampleRate);
          }
          if (!gain) {
            gain = ctx.createGain();
            gain.gain.value = 0.08;
            gain.connect(ctx.destination);
            write("gain connected");
          }
          if (!osc) {
            osc = ctx.createOscillator();
            osc.type = "sine";
            osc.frequency.value = 440;
            osc.connect(gain);
            osc.start();
            write("oscillator started");
          }
          await ctx.resume();
          write("context resumed: " + ctx.state);
        } catch (error) {
          write("ERROR: " + (error && error.message ? error.message : String(error)));
          console.error(error);
        }
      });

      document.getElementById("stop").addEventListener("click", async () => {
        try {
          if (osc) {
            osc.stop();
            osc.disconnect();
            osc = null;
            write("oscillator stopped");
          }
          if (gain) {
            gain.disconnect();
            gain = null;
            write("gain disconnected");
          }
          if (ctx && ctx.state === "running") {
            await ctx.suspend();
            write("context suspended");
          }
        } catch (error) {
          write("ERROR: " + (error && error.message ? error.message : String(error)));
          console.error(error);
        }
      });
    </script>
  </body>
</html>
