<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lorenz Voice · EL-SYSTEMA</title>
<link rel="stylesheet" href="./core/style.css" />
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
  <span class="title">LORENZ VOICE <small>chaotic generative synth · A3</small></span>
  <button id="arm">▶ audio</button>
  <label>midi <select id="midi"></select></label>
  <label>ρ <input id="rho" type="range" min="24" max="46" step="0.1" value="28"></label>
  <label>σ <input id="sig" type="range" min="4" max="16" step="0.1" value="10"></label>
  <label>β <input id="bet" type="range" min="1.5" max="4" step="0.05" value="2.667"></label>
  <label>speed <input id="spd" type="range" min="0.2" max="3" step="0.01" value="1"></label>
</div>
<div class="readout" id="read"></div>
<div class="note">generative — no tempo. CC1→ρ CC2→σ CC3→β · pitchbend→time speed · sustain=freeze · note=register</div>

<script type="module">
import { MidiHub, armAudio } from './core/midi.js';
import { tune } from './core/tuning.js';

const ctx = new (window.AudioContext || window.webkitAudioContext)();
const master = ctx.createGain(); master.gain.value = 0.0; master.connect(ctx.destination);
const osc = ctx.createOscillator(); osc.type = 'sawtooth';
const sub = ctx.createOscillator(); sub.type = 'sine';
const oscG = ctx.createGain(); oscG.gain.value = 0.6;
const subG = ctx.createGain(); subG.gain.value = 0.4;
const filt = ctx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 800; filt.Q.value = 6;
const pan = ctx.createStereoPanner();
osc.connect(oscG).connect(filt); sub.connect(subG).connect(filt);
filt.connect(pan).connect(master);
osc.start(); sub.start();
armAudio(ctx, document.getElementById('arm'));
// fade voice in once audio is armed
document.getElementById('arm').addEventListener('pointerdown', () => master.gain.setTargetAtTime(0.5, ctx.currentTime, 0.4), { once: true });

// ---- Lorenz state ----
let s = { x: 0.9, y: 0, z: 20 };
let rho = 28, sig = 10, bet = 8/3, speed = 1, freeze = false;
let center = 260; // register centre (Hz), driven by note

function deriv(p) { return { x: sig*(p.y-p.x), y: p.x*(rho-p.z)-p.y, z: p.x*p.y-bet*p.z }; }
function rk4(p, h) {
  const a=deriv(p);
  const b=deriv({x:p.x+a.x*h/2,y:p.y+a.y*h/2,z:p.z+a.z*h/2});
  const c=deriv({x:p.x+b.x*h/2,y:p.y+b.y*h/2,z:p.z+b.z*h/2});
  const d=deriv({x:p.x+c.x*h,y:p.y+c.y*h,z:p.z+c.z*h});
  return { x:p.x+h/6*(a.x+2*b.x+2*c.x+d.x), y:p.y+h/6*(a.y+2*b.y+2*c.y+d.y), z:p.z+h/6*(a.z+2*b.z+2*c.z+d.z) };
}

// ---- controls ----
const bind=(id,fn)=>{ const el=document.getElementById(id); el.oninput=()=>fn(+el.value); return el; };
bind('rho',v=>rho=v); bind('sig',v=>sig=v); bind('bet',v=>bet=v); bind('spd',v=>speed=v);

const midi = new MidiHub();
midi.on('note',(note,vel,on)=>{ if(on) center = tune(note,{mode:'phi',base:260,refNote:60}); });
midi.on('cc',(num,val)=>{
  if(num===1){ rho=24+val*22; document.getElementById('rho').value=rho; }
  else if(num===2){ sig=4+val*12; document.getElementById('sig').value=sig; }
  else if(num===3){ bet=1.5+val*2.5; document.getElementById('bet').value=bet; }
  else if(num===64){ freeze = val>0.5; }
});
midi.on('pitch',(v)=>{ speed = 1 + v*1.8; document.getElementById('spd').value=Math.max(0.2,speed); });
midi.init(document.getElementById('midi'));

// ---- canvas trail ----
const canvas=document.getElementById('c'); const g=canvas.getContext('2d');
function resize(){ canvas.width=innerWidth*devicePixelRatio; canvas.height=innerHeight*devicePixelRatio; }
addEventListener('resize',resize); resize();
const trail=[];

function logMap(x, lo, hi){ // x roughly in [-25,25] → [lo,hi] log
  const t = Math.min(1, Math.max(0, (x+25)/50));
  return lo * Math.pow(hi/lo, t);
}

function frame(){
  if(!freeze){ for(let i=0;i<6;i++) s = rk4(s, 0.006*speed); }
  // map to audio
  const f = center/260 * logMap(s.x, 60, 1200);
  const subf = f*0.5;
  const cutoff = 300 + Math.abs(s.z)*90;
  const p = Math.max(-1,Math.min(1, s.y/26));
  osc.frequency.setTargetAtTime(f, ctx.currentTime, 0.02);
  sub.frequency.setTargetAtTime(subf, ctx.currentTime, 0.03);
  filt.frequency.setTargetAtTime(cutoff, ctx.currentTime, 0.03);
  pan.pan.setTargetAtTime(p, ctx.currentTime, 0.05);

  trail.push({x:s.x,z:s.z}); if(trail.length>1400) trail.shift();
  const W=canvas.width,H=canvas.height;
  g.fillStyle='rgba(4,8,10,0.18)'; g.fillRect(0,0,W,H);
  const cx=W/2, cy=H*0.56, sc=Math.min(W,H)/62;
  g.lineWidth=1.4; g.beginPath();
  for(let i=0;i<trail.length;i++){ const t=trail[i]; const X=cx+t.x*sc, Y=cy-(t.z-25)*sc; if(i===0)g.moveTo(X,Y); else g.lineTo(X,Y); }
  g.strokeStyle='rgba(127,232,192,0.5)'; g.stroke();
  const hx=cx+s.x*sc, hy=cy-(s.z-25)*sc;
  g.fillStyle='#d0ff5a'; g.beginPath(); g.arc(hx,hy,4,0,7); g.fill();
  document.getElementById('read').textContent=`ρ ${rho.toFixed(1)}  σ ${sig.toFixed(1)}  β ${bet.toFixed(2)}  speed ${speed.toFixed(2)}  f ${f.toFixed(0)}Hz ${freeze?' [FROZEN]':''}`;
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
